<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unfold</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ─── Reset ──────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d0d0c;
        /* suppress any default user-agent styling */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ─── Scene ─────────────────────────────────────────────── */
      .scene {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        pointer-events: none;
        /* allow macOS window drag from the empty areas */
        -webkit-app-region: drag;
      }

      /* ─── Text ──────────────────────────────────────────────── */
      .wordmark {
        display: flex;
        flex-direction: row;
        align-items: baseline;
        gap: 0;
        font-family: "DM Sans", ui-sans-serif, system-ui, sans-serif;
        font-size: clamp(3rem, 7.2vw, 4.7rem);
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1;
        /* mirrors: color-mix(in srgb, #f7f2f2 60%, #999aa4 40%) */
        color: #d1cfd3;
        text-transform: lowercase;
      }

      .seg {
        display: inline-flex;
        position: relative;
        line-height: 1;
        opacity: 0;
        transform: translateY(10px);
      }

      /* ─── Animations ────────────────────────────────────────── */

      /*
       * Total period = 2.4 s (animation) + 0.3 s (gap) = 2.7 s
       * Keyframe % breakpoints (times × 2400 / 2700):
       *   "un"   → [0%, 3.6%, 23.1%, 71.1%, 88.9%, 100%]
       *   "fold" → [0%, 33.8%, 55.1%, 71.1%, 88.9%, 100%]
       */

      @keyframes un-text {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        3.6% {
          opacity: 0;
          transform: translateY(10px);
          /* ease-out for the rise-in phase */
          animation-timing-function: cubic-bezier(0, 0, 0.58, 1);
        }
        23.1% {
          opacity: 1;
          transform: translateY(0);
        }
        71.1% {
          opacity: 1;
          transform: translateY(0);
          /* ease-in for the fade-out phase */
          animation-timing-function: cubic-bezier(0.42, 0, 1, 1);
        }
        88.9%,
        100% {
          opacity: 0;
          transform: translateY(0);
        }
      }

      @keyframes fold-text {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        33.8% {
          opacity: 0;
          transform: translateY(10px);
          animation-timing-function: cubic-bezier(0, 0, 0.58, 1);
        }
        55.1% {
          opacity: 1;
          transform: translateY(0);
        }
        71.1% {
          opacity: 1;
          transform: translateY(0);
          animation-timing-function: cubic-bezier(0.42, 0, 1, 1);
        }
        88.9%,
        100% {
          opacity: 0;
          transform: translateY(0);
        }
      }

      .seg--un {
        animation: un-text 2.7s linear infinite;
      }

      .seg--fold {
        animation: fold-text 2.7s linear infinite;
      }

      /* ─── Exit transition ─────────────────────────────────── */
      body {
        opacity: 1;
        transition: opacity 500ms ease;
      }

      body.is-exiting {
        opacity: 0;
      }

      @media (prefers-reduced-motion: reduce) {
        .seg {
          opacity: 1;
          transform: none;
          animation: none;
        }

        body {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="wordmark">
        <span class="seg seg--un">un</span>
        <span class="seg seg--fold">fold</span>
      </div>
    </div>
  </body>
</html>
